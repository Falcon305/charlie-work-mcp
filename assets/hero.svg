<svg width="1280" height="440" viewBox="0 0 1280 440" xmlns="http://www.w3.org/2000/svg" font-family="'Trebuchet MS', 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="cork" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#b98a4a"/>
      <stop offset="1" stop-color="#8f6432"/>
    </linearGradient>
    <linearGradient id="wood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5b3c1e"/>
      <stop offset="1" stop-color="#3d2712"/>
    </linearGradient>
    <filter id="drop" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="5" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1280" height="440" fill="url(#wood)"/>
  <rect x="18" y="18" width="1244" height="404" rx="6" fill="url(#cork)"/>

  <g fill="#7a5326" opacity="0.35">
    <circle cx="90" cy="70" r="2"/><circle cx="240" cy="120" r="1.6"/><circle cx="410" cy="60" r="2.2"/>
    <circle cx="600" cy="150" r="1.7"/><circle cx="820" cy="80" r="2"/><circle cx="1010" cy="130" r="1.8"/>
    <circle cx="1150" cy="70" r="2.1"/><circle cx="160" cy="330" r="1.9"/><circle cx="360" cy="390" r="2"/>
    <circle cx="700" cy="360" r="1.6"/><circle cx="980" cy="380" r="2.2"/><circle cx="1180" cy="340" r="1.7"/>
    <circle cx="520" cy="300" r="1.6"/><circle cx="300" cy="200" r="1.8"/><circle cx="880" cy="250" r="2"/>
  </g>

  <polyline points="640,150 175,300 400,352 665,300 905,352 1120,300"
    fill="none" stroke="#b02a20" stroke-width="2.4" opacity="0.9"/>

  <g filter="url(#drop)">
    <g transform="rotate(-1.6 640 118)">
      <rect x="360" y="52" width="560" height="132" rx="3" fill="#f5efdd"/>
      <text x="640" y="120" text-anchor="middle" font-size="66" font-weight="800" fill="#22201b" letter-spacing="2">CHARLIE WORK</text>
      <text x="640" y="158" text-anchor="middle" font-size="21" fill="#6a4a2a" font-style="italic">the work nobody wanted to do — now it has a queue</text>
    </g>
    <circle cx="640" cy="60" r="8" fill="#c0392b"/>
    <circle cx="637" cy="57" r="2.5" fill="#e8837a"/>
  </g>

  <g font-size="19" font-weight="700" fill="#2a251d">
    <g filter="url(#drop)" transform="rotate(-3 250 330)">
      <rect x="95" y="300" width="200" height="72" rx="2" fill="#eef3e6"/>
      <text x="195" y="332" text-anchor="middle">FLAKY TESTS</text>
      <text x="195" y="356" text-anchor="middle" font-size="13" font-weight="400" fill="#7a3b34">still rat-nesting in CI</text>
    </g>
    <circle cx="175" cy="300" r="7" fill="#2d6cdf"/>

    <g filter="url(#drop)" transform="rotate(2.4 400 352)">
      <rect x="305" y="322" width="190" height="72" rx="2" fill="#fdf6e3"/>
      <text x="400" y="354" text-anchor="middle">TODO ROT</text>
      <text x="400" y="378" text-anchor="middle" font-size="13" font-weight="400" fill="#7a3b34">since two quarters ago</text>
    </g>
    <circle cx="400" cy="322" r="7" fill="#e0a021"/>

    <g filter="url(#drop)" transform="rotate(-2.2 665 330)">
      <rect x="565" y="300" width="200" height="72" rx="2" fill="#f0e8f5"/>
      <text x="665" y="332" text-anchor="middle">DEAD FLAGS</text>
      <text x="665" y="356" text-anchor="middle" font-size="13" font-weight="400" fill="#7a3b34">there is no Pepe Silvia</text>
    </g>
    <circle cx="665" cy="300" r="7" fill="#8e44ad"/>

    <g filter="url(#drop)" transform="rotate(3 905 352)">
      <rect x="805" y="322" width="200" height="72" rx="2" fill="#fdeceb"/>
      <text x="905" y="354" text-anchor="middle">EXPIRING CERTS</text>
      <text x="905" y="378" text-anchor="middle" font-size="13" font-weight="400" fill="#7a3b34">nine days, Frank</text>
    </g>
    <circle cx="905" cy="322" r="7" fill="#c0392b"/>

    <g filter="url(#drop)" transform="rotate(-2.6 1120 330)">
      <rect x="1018" y="300" width="204" height="72" rx="2" fill="#e7f1ee"/>
      <text x="1120" y="332" text-anchor="middle">UNOWNED SCRIPTS</text>
      <text x="1120" y="356" text-anchor="middle" font-size="13" font-weight="400" fill="#7a3b34">nobody's grease trap</text>
    </g>
    <circle cx="1120" cy="300" r="7" fill="#16a085"/>
  </g>

  <g transform="rotate(-1 640 232)">
    <rect x="470" y="212" width="340" height="42" rx="3" fill="#1d1b17"/>
    <text x="640" y="240" text-anchor="middle" font-size="18" font-weight="700" fill="#f5efdd" letter-spacing="1">an MCP server · Python · uvx charlie-work-mcp</text>
  </g>
